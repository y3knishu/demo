<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET PG Quiz</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* MOBILE PALETTE BUTTON */

#paletteToggle{
display:none;
position:fixed;
bottom:80px;
right:15px;
z-index:9999;
background:#173a70;
color:white;
border:none;
padding:12px 16px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

/* MOBILE IMPROVEMENTS */

@media(max-width:900px){

body{
overflow:auto;
}

.quiz-container{
flex-direction:column;
height:auto;
}

.main-panel{
width:100%;
}

.question-area{
padding:15px;
}

.question{
font-size:18px;
}

.image{
max-height:300px;
}

.options button{
font-size:17px;
padding:16px;
}

.bottom-bar{
display:flex;
flex-wrap:wrap;
gap:8px;
position:sticky;
bottom:0;
background:white;
z-index:999;
}

.bottom-bar button{
flex:1;
min-width:120px;
}

#paletteToggle{
display:block;
}

.right-panel{
position:fixed;
top:0;
right:-100%;
width:85%;
height:100%;
background:white;
z-index:10000;
transition:.3s;
overflow-y:auto;
box-shadow:-4px 0 12px rgba(0,0,0,.25);
}

.right-panel.show{
right:0;
}

.palette-grid{
grid-template-columns:repeat(5,1fr);
}

}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
color:#222;
height:100vh;
overflow:hidden;
}

.quiz-container{
display:flex;
height:100vh;
}

/* MAIN AREA */

.main-panel{
flex:1;
display:flex;
flex-direction:column;
background:white;
}

.top-bar{
background:#173a70;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
font-size:18px;
}

.question-area{
flex:1;
overflow-y:auto;
padding:25px;
}

.question{
font-size:20px;
font-weight:600;
margin-bottom:20px;
}

.image{
max-width:100%;
max-height:450px;
border-radius:8px;
display:none;
margin-bottom:20px;
cursor:pointer;
}

/* OPTIONS */

.options button{
width:100%;
padding:14px;
margin-bottom:10px;
font-size:16px;
text-align:left;
border:1px solid #ddd;
background:white;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.options button:hover{
background:#eef5ff;
}

.correct{
background:#c8e6c9 !important;
}

.wrong{
background:#ffcdd2 !important;
}

/* BOTTOM BAR */

.bottom-bar{
padding:15px;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-between;
}

.bottom-bar button{
padding:10px 16px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
margin-right:8px;
}

.prev-btn{
background:#607d8b;
color:white;
}

.next-btn{
background:#2196f3;
color:white;
}

.submit-btn{
background:#4caf50;
color:white;
}

.retry-btn{
background:#ff9800;
color:white;
}

.home-btn{
background:#9c27b0;
color:white;
}

/* RIGHT PANEL */

.right-panel{
width:300px;
background:#fafafa;
border-left:1px solid #ddd;
overflow-y:auto;
}

.stats{
padding:15px;
border-bottom:1px solid #ddd;
}

.stat{
margin-bottom:10px;
font-weight:bold;
}

.palette-title{
padding:15px;
font-weight:bold;
background:#2f6db5;
color:white;
}

.palette-grid{
padding:15px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.palette-btn{
width:45px;
height:45px;
border:1px solid #999;
background:white;
cursor:pointer;
font-weight:bold;
}

.palette-btn.current{
background:#ff5722;
color:white;
}

.palette-btn.answered{
background:#76c043;
color:white;
}

/* EXPLANATION */

#explanation-box{
margin-top:30px;
padding:15px;
background:#f5f5f5;
border-radius:8px;
display:none;
}

#explanation-image{
max-width:100%;
margin-top:10px;
display:none;
}

.summary{
margin-top:20px;
padding:15px;
background:#f5f5f5;
border-radius:8px;
}

@media(max-width:900px){

.quiz-container{
flex-direction:column;
}

.right-panel{
width:100%;
height:250px;
}

}

</style>

</head>

<body>

<div class="quiz-container">

<div class="main-panel">

<div class="top-bar">
<div id="question-number">Question 1</div>
<div id="timer">00:00</div>
</div>

<div class="question-area">

<div id="question-text" class="question"></div>

<img id="question-image" class="image">

<div id="options" class="options"></div>

<div id="explanation-box">

<h3 id="explanation-title">Explanation</h3>

<img id="explanation-image">

<p id="explanation-text"></p>

</div>

<div id="result-summary" class="summary"></div>

</div>

<div class="bottom-bar">

<div>

<button class="prev-btn" onclick="prevQuestion()">
⬅ Prev
</button>

<button class="retry-btn" onclick="resetQuiz()">
🔄 Retry
</button>

<button class="home-btn"
onclick="location.href='index.html'">
🏠 Home
</button>

</div>

<div>

<button class="next-btn"
onclick="nextQuestion()">
Save & Next ➜
</button>

<button class="submit-btn"
onclick="submitQuiz()">
Submit Test
</button>

</div>

</div>

</div>
<button id="paletteToggle">📋 Palette</button>
<div class="right-panel">

<div class="stats">

<div class="stat"
id="answeredCount">
Answered : 0
</div>

<div class="stat"
id="notAnsweredCount">
Not Answered : 0
</div>

<div class="stat"
id="totalCount">
Total Questions : 0
</div>

</div>

<div class="palette-title">
Question Palette
</div>

<div id="palette"
class="palette-grid">
</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
